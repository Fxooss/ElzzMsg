<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ElzzMsg</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

  <!-- WELCOME SCREEN -->
  <div id="welcomeScreen" class="screen active">
    <div class="welcome-content">
      <div class="logo-container">
        <div class="logo-big"><svg viewBox="0 0 303 172" width="180"><path fill="#00a884" d="M229.565 160.229c32.647-16.595 54.727-50.653 54.727-89.759C284.292 31.522 252.77 0 214.074 0c-25.245 0-47.305 13.039-59.694 32.637-5.432-1.45-11.139-2.227-17.017-2.227-36.359 0-65.846 29.487-65.846 65.846 0 4.832.523 9.54 1.512 14.074C49.427 115.485 31.67 138.867 31.67 166.59c0 3.09.227 6.125.666 9.096h196.229c.335-2.952.502-5.952.502-9.001 0-2.18-.086-4.34-.252-6.479l.75.023z"/><path fill="#ffffff" d="M61.412 166.59c0-23.052 15.693-42.472 37.002-48.204-1.174-4.665-1.801-9.541-1.801-14.563 0-32.872 26.654-59.526 59.526-59.526 5.227 0 10.291.676 15.115 1.945C182.598 27.267 201.699 13 224.074 13c35.078 0 63.526 28.448 63.526 63.526 0 33.777-26.318 61.352-59.526 63.412v.088H61.876a53.7 53.7 0 0 1-.464-7.436z"/></svg></div>
        <h1>ElzzMsg</h1>
      </div>
      <div class="welcome-text"><h2>Welcome To ElzzMsg</h2><p>Press Next To Set Your Username!</p></div>
      <button id="nextBtn" class="btn-next">Next <span>→</span></button>
    </div>
  </div>

  <!-- USERNAME SCREEN -->
  <div id="usernameScreen" class="screen">
    <div class="setup-container">
      <div class="setup-header"><button class="back-btn" onclick="goBack('welcomeScreen')"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button><h2>Set Username</h2></div>
      <p class="setup-desc">Unique identifier for your account</p>
      <div class="input-group"><span class="input-prefix">@</span><input type="text" id="usernameInput" placeholder="username" maxlength="20"></div>
      <button id="usernameNext" class="btn-next" disabled>Next <span>→</span></button>
    </div>
  </div>

  <!-- DISPLAY NAME SCREEN -->
  <div id="displayNameScreen" class="screen">
    <div class="setup-container">
      <div class="setup-header"><button class="back-btn" onclick="goBack('usernameScreen')"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button><h2>Profile Info</h2></div>
      <div class="profile-setup">
        <div class="avatar-setup" id="setupAvatar"></div>
        <button class="btn-add-photo" onclick="document.getElementById('setupAvatarInput').click()">Add photo</button>
        <input type="file" id="setupAvatarInput" hidden accept="image/*">
      </div>
      <div class="input-group"><input type="text" id="displayNameInput" placeholder="Your name" maxlength="25"></div>
      <button id="displayNext" class="btn-next" disabled>Next <span>→</span></button>
    </div>
  </div>

  <!-- MAIN SCREEN -->
  <div id="mainScreen" class="screen">
    <header class="wa-header">
      <div class="header-logo"><svg viewBox="0 0 303 172" width="100"><path fill="#00a884" d="M229.565 160.229c32.647-16.595 54.727-50.653 54.727-89.759C284.292 31.522 252.77 0 214.074 0c-25.245 0-47.305 13.039-59.694 32.637-5.432-1.45-11.139-2.227-17.017-2.227-36.359 0-65.846 29.487-65.846 65.846 0 4.832.523 9.54 1.512 14.074C49.427 115.485 31.67 138.867 31.67 166.59c0 3.09.227 6.125.666 9.096h196.229c.335-2.952.502-5.952.502-9.001 0-2.18-.086-4.34-.252-6.479l.75.023z"/></svg></div>
      <div class="header-right">
        <button class="icon-btn" onclick="openProfile()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </header>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('chats')">Chats</div>
      <div class="tab" onclick="switchTab('status')">Status</div>
    </div>

    <!-- CHATS VIEW -->
    <div id="chatsView" class="view-section">
      <div class="search-container"><div class="search-box"><input type="text" placeholder="Search" id="searchInput"></div></div>
      <div class="chat-list" id="chatList"></div>
      
      <!-- TOMBOL TELEGRAM -->
      <a href="https://t.me/elzzellz" target="_blank" class="telegram-link">
        <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.12.03-1.99 1.27-5.62 3.72-.53.36-1.01.54-1.44.53-.47-.01-1.38-.27-2.06-.49-.83-.27-1.49-.42-1.43-.88.03-.24.37-.49 1.02-.74 3.98-1.73 6.64-2.87 7.97-3.43 3.79-1.57 4.58-1.84 5.09-1.85.11 0 .37.03.53.17.14.12.18.28.2.45-.01.06.01.24 0 .38z"/></svg>
      </a>

      <!-- FAB ADD -->
      <div class="fab-container">
        <div class="fab-menu" id="fabMenu">
            <div class="fab-option" onclick="openAddContact()">Add Contact</div>
            <div class="fab-option" onclick="openCreateGroup()">Create Group</div>
        </div>
        <button class="fab-add" onclick="toggleFab()"><svg viewBox="0 0 24 24" width="26"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg></button>
      </div>
    </div>

    <!-- STATUS VIEW -->
    <div id="statusView" class="view-section" style="display:none">
      <div class="status-list" id="statusList">
        <div class="status-item my-status" onclick="openMyStatus()">
          <div class="status-avatar-wrapper"><div class="status-avatar" id="myStatusAvatar"></div><div class="add-status-icon">+</div></div>
          <div class="status-info"><h4>My Status</h4><p>Tap to add status</p></div>
        </div>
      </div>
      <input type="file" id="statusInput" hidden accept="image/*,video/*">
    </div>

    <!-- CHAT VIEW -->
    <div id="chatView" class="screen">
      <header class="chat-header-bar">
        <button class="back-btn" onclick="backToList()"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
        <div class="chat-user-info" onclick="showContactProfile()">
            <div class="chat-avatar" id="chatAvatar"></div>
            <div class="chat-user-details">
              <h4 id="chatName">Name</h4>
              <span id="chatStatus">online</span>
            </div>
        </div>
        <button class="icon-btn" id="groupInfoBtn" style="display:none" onclick="openGroupInfo()">
            <svg viewBox="0 0 24 24" width="22"><path fill="currentColor" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </button>
      </header>
      <div class="messages-container" id="messagesContainer"></div>
      <div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>
      <div class="input-area">
        <div class="message-input-wrapper"><input type="text" id="messageInput" placeholder="Type a message"></div>
        <button class="icon-btn send-btn" id="sendBtn" onclick="sendMessage()"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
      </div>
    </div>
  </div>

  <!-- MODALS -->
  <div id="addContactModal" class="modal"><div class="modal-backdrop" onclick="closeAddContact()"></div><div class="modal-content"><div class="modal-header"><h3>Add Contact</h3><button class="close-btn" onclick="closeAddContact()"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button></div><div class="modal-body"><div class="input-group"><input type="text" id="addContactInput" placeholder="Enter username"></div><button class="btn-add" onclick="addContact()">Add</button></div></div></div>
  
  <div id="createGroupModal" class="modal"><div class="modal-backdrop" onclick="closeCreateGroup()"></div><div class="modal-content"><div class="modal-header"><h3>Create Group</h3><button class="close-btn" onclick="closeCreateGroup()"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button></div><div class="modal-body"><div class="input-group"><input type="text" id="groupNameInput" placeholder="Group Name"></div><button class="btn-add" onclick="createGroup()">Create</button></div></div></div>

  <div id="groupInfoModal" class="modal"><div class="modal-backdrop" onclick="closeGroupInfo()"></div><div class="modal-content"><div class="modal-header"><h3>Group Info</h3><button class="close-btn" onclick="closeGroupInfo()"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button></div><div class="modal-body"><h4>Add Member</h4><div class="input-group"><input type="text" id="addMemberInput" placeholder="Username"></div><button class="btn-add" onclick="addMember()">Add</button><hr style="margin:15px 0;border-color:var(--border)"><div id="memberList"></div></div></div></div>

  <div id="profileModal" class="modal"><div class="modal-backdrop" onclick="closeProfile()"></div><div class="modal-content profile-modal"><div class="modal-header"><h3>Settings</h3><button class="close-btn" onclick="closeProfile()"><svg viewBox="0 0 24 24" width="24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button></div><div class="modal-body"><div class="profile-section"><div class="profile-avatar" id="profileAvatar"></div><button class="btn-add-photo" onclick="document.getElementById('avatarInput').click()">Change photo</button><input type="file" id="avatarInput" hidden accept="image/*"></div><div class="settings-group"><label>Username</label><input type="text" id="profileUsername" disabled style="color:var(--text-sec)"></div><div class="settings-group"><label>Name</label><input type="text" id="profileName"></div><div class="settings-group"><label>Bio</label><textarea id="profileBio" rows="2"></textarea></div><button class="btn-add" onclick="saveProfile()">Save</button></div></div></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
          </html>
